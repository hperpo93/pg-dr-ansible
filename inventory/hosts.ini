# =============================================================================
# Inventory — PostgreSQL / Patroni / etcd / HAProxy DR cluster
# Update ansible_host values if DR nodes use different IPs
# =============================================================================

# --- Standalone restore target -----------------------------------------------
# Used ONLY by dr_standalone.yml — a single isolated node, no Patroni, no etcd.
# Set ansible_host to your designated restore/test server.
[standalone]
dr-standalone ansible_host=10.158.117.227

# --- PostgreSQL + Patroni + etcd nodes ---------------------------------------
[pg_nodes]
dr-node-1 ansible_host=10.158.117.115 etcd_node_ip=10.158.117.115 etcd_cert_name=etcd-psql1 node_index=1
dr-node-2 ansible_host=10.158.117.66 etcd_node_ip=10.158.117.66 etcd_cert_name=etcd-psql2 node_index=2
dr-node-3 ansible_host=10.158.117.162 etcd_node_ip=10.158.117.162 etcd_cert_name=etcd-psql3 node_index=3

# The node Patroni will bootstrap as primary (first node in pg_nodes by default)
[pg_primary]
dr-node-1 ansible_host=10.158.117.115

[pg_replicas]
dr-node-2 ansible_host=10.158.117.66
dr-node-3 ansible_host=10.158.117.162

# --- HAProxy + Keepalived load-balancer nodes --------------------------------
[lb_nodes]
#psql-lb-1 ansible_host=192.168.100.201 keepalived_priority=99 keepalived_state=MASTER keepalived_src_ip=192.168.100.201 keepalived_peers="192.168.100.202,192.168.100.203"
#psql-lb-2 ansible_host=192.168.100.202 keepalived_priority=98 keepalived_state=BACKUP keepalived_src_ip=192.168.100.202 keepalived_peers="192.168.100.201,192.168.100.203"
#psql-lb-3 ansible_host=192.168.100.203 keepalived_priority=97 keepalived_state=BACKUP keepalived_src_ip=192.168.100.203 keepalived_peers="192.168.100.201,192.168.100.202"

# --- Backup server ----------------------------------------------------------
# Required so Ansible can delegate the authorized_key task to psql-backups
[backup_server]
backup-server ansible_host=10.158.117.27

# --- Convenience groups ------------------------------------------------------
[etcd:children]
pg_nodes

[all:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3

