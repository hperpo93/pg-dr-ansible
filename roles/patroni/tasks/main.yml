---
# =============================================================================
# Role: patroni
# Writes /etc/patroni/config.yml per node and starts Patroni.
# Handles both bootstrap (primary) and replica join based on group membership.
# =============================================================================

- name: Ensure /etc/patroni directory exists
  ansible.builtin.file:
    path: /etc/patroni
    state: directory
    owner: "{{ pg_user }}"
    group: "{{ pg_group }}"
    mode: "0750"

- name: Write Patroni config.yml for this node
  ansible.builtin.template:
    src: patroni.config.yml.j2
    dest: "{{ patroni_conf_file }}"
    owner: "{{ pg_user }}"
    group: "{{ pg_group }}"
    mode: "0640"
  notify: Restart patroni

- name: Ensure PGDATA ownership is correct
  ansible.builtin.file:
    path: "{{ pg_data_dir }}"
    state: directory
    owner: "{{ pg_user }}"
    group: "{{ pg_group }}"
    mode: "0700"
    recurse: true

# --- Primary: PITR pre-start — let PostgreSQL recover to target before Patroni

# When PITR is requested, Patroni's bootstrap would promote PostgreSQL immediately
# at the consistency point, ignoring recovery_target_time. Instead, start PostgreSQL
# directly, wait for PITR recovery to complete and promote, then start Patroni which
# picks up the already-running primary.

- name: "[primary][DR] Override log_directory — production path may not exist on DR nodes"
  ansible.builtin.lineinfile:
    path: "{{ pg_data_dir }}/postgresql.auto.conf"
    line: "log_directory = '/var/log/postgresql'"
    regexp: "^log_directory"
    create: true
    owner: "{{ pg_user }}"
    group: "{{ pg_group }}"
    mode: "0600"
  when:
    - inventory_hostname in groups['pg_primary']
    - restore_mode is defined
    - restore_mode in ['primary', 'full']

- name: "[primary][DR] Start PostgreSQL directly to complete recovery before Patroni"
  ansible.builtin.command: >
    {{ pg_bin_dir }}/pg_ctl -D {{ pg_data_dir }}
    -l /var/log/postgresql/postgresql-primary-recovery.log
    start
  become: true
  become_user: "{{ pg_user }}"
  when:
    - inventory_hostname in groups['pg_primary']
    - restore_mode is defined
    - restore_mode in ['primary', 'full']

- name: "[primary][DR] Wait for PostgreSQL to complete recovery and promote"
  ansible.builtin.command: >
    psql -U {{ pg_superuser }} -tAc "SELECT pg_is_in_recovery();"
  become: true
  become_user: "{{ pg_user }}"
  register: pg_recovery_status
  until: pg_recovery_status.stdout | trim == 'f'
  retries: 60
  delay: 5
  changed_when: false
  when:
    - inventory_hostname in groups['pg_primary']
    - restore_mode is defined
    - restore_mode in ['primary', 'full']

# Remove patroni.dynamic.json so Patroni uses the fresh bootstrap config (correct
# DR node IPs in pg_hba, correct archive settings) instead of the old production
# DCS config that was stored in PGDATA by the source cluster.
- name: "[primary][DR] Remove patroni.dynamic.json — force Patroni to use bootstrap config"
  ansible.builtin.file:
    path: "{{ pg_data_dir }}/patroni.dynamic.json"
    state: absent
  when:
    - inventory_hostname in groups['pg_primary']
    - restore_mode is defined
    - restore_mode in ['primary', 'full']

# --- Primary: start first and wait for Leader --------------------------------

- name: "[primary] Start Patroni — bootstraps cluster"
  ansible.builtin.systemd:
    name: patroni
    state: started
    enabled: true
    daemon_reload: true
  when: inventory_hostname in groups['pg_primary']

- name: "[primary] Wait for Patroni API to respond"
  ansible.builtin.uri:
    url: "https://{{ ansible_facts['default_ipv4']['address'] }}:{{ patroni_api_port }}"
    method: GET
    validate_certs: false
    status_code: [200, 503]
  register: patroni_api
  until: patroni_api.status in [200, 503]
  retries: 30
  delay: 5
  when: inventory_hostname in groups['pg_primary']

- name: "[primary] Wait for this node to become Patroni Leader"
  ansible.builtin.uri:
    url: "https://{{ ansible_facts['default_ipv4']['address'] }}:{{ patroni_api_port }}/leader"
    method: GET
    validate_certs: false
    status_code: 200
  register: leader_check
  until: leader_check.status == 200
  retries: 30
  delay: 5
  when: inventory_hostname in groups['pg_primary']

- name: "[primary] Confirm primary is Leader"
  ansible.builtin.debug:
    msg: "Patroni primary {{ inventory_hostname }} is the cluster Leader."
  when: inventory_hostname in groups['pg_primary']

# --- Replicas: wipe PGDATA and start — Patroni clones from primary -----------

- name: "[replica] Wipe PGDATA — Patroni will clone from primary"
  ansible.builtin.file:
    path: "{{ pg_data_dir }}"
    state: absent
  when: inventory_hostname in groups['pg_replicas']

- name: "[replica] Re-create empty PGDATA"
  ansible.builtin.file:
    path: "{{ pg_data_dir }}"
    state: directory
    owner: "{{ pg_user }}"
    group: "{{ pg_group }}"
    mode: "0700"
  when: inventory_hostname in groups['pg_replicas']

- name: "[replica] Start Patroni — clones from primary automatically"
  ansible.builtin.systemd:
    name: patroni
    state: started
    enabled: true
    daemon_reload: true
  when: inventory_hostname in groups['pg_replicas']

- name: "[replica] Wait for Patroni API to respond"
  ansible.builtin.uri:
    url: "https://{{ ansible_facts['default_ipv4']['address'] }}:{{ patroni_api_port }}"
    method: GET
    validate_certs: false
    status_code: [200, 503]
  register: replica_api
  until: replica_api.status in [200, 503]
  retries: 60
  delay: 10
  when: inventory_hostname in groups['pg_replicas']

- name: "[replica] Wait for replica to reach running state"
  ansible.builtin.uri:
    url: "https://{{ ansible_facts['default_ipv4']['address'] }}:{{ patroni_api_port }}/replica"
    method: GET
    validate_certs: false
    status_code: 200
  register: replica_check
  until: replica_check.status == 200
  retries: 60
  delay: 10
  when: inventory_hostname in groups['pg_replicas']

- name: "[replica] Confirm replica is streaming"
  ansible.builtin.debug:
    msg: "Patroni replica {{ inventory_hostname }} is streaming from primary."
  when: inventory_hostname in groups['pg_replicas']
